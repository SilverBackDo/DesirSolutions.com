server {
  listen 80;
  server_name desirsolutions.com www.desirsolutions.com;

  server_tokens off;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
    try_files $uri =404;
  }

  location / {
    return 301 https://desirsolutions.com$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name desirsolutions.com;

  root /usr/share/nginx/html;
  index index.html;
  charset utf-8;

  ssl_certificate /etc/letsencrypt/live/desirsolutions.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/desirsolutions.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_session_tickets off;

  server_tokens off;
  client_max_body_size 1m;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https:; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self'; base-uri 'self'; frame-ancestors 'self'; form-action 'self' https:;" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Cross-Origin-Opener-Policy "same-origin" always;
  add_header Cross-Origin-Resource-Policy "same-origin" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript application/xml+rss image/svg+xml;
  gzip_min_length 1024;

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(html)$ {
    expires -1;
    add_header Cache-Control "no-store";
  }

  location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
    try_files $uri =404;
  }
}

server {
  listen 443 ssl http2;
  server_name www.desirsolutions.com;

  ssl_certificate /etc/letsencrypt/live/desirsolutions.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/desirsolutions.com/privkey.pem;
  return 301 https://desirsolutions.com$request_uri;
}
