# ─── Global hardening ───
server_tokens off;
client_max_body_size 1m;

# ─── Gzip compression ───
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_min_length 256;
gzip_comp_level 4;
gzip_types text/plain text/css text/xml text/javascript
           application/json application/javascript application/xml
           application/rss+xml application/atom+xml
           image/svg+xml font/woff2;

# ─── Rate limiting zones ───
limit_req_zone $binary_remote_addr zone=pages:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=5r/s;
limit_req_status 429;

# HTTP — redirect to HTTPS and handle certbot challenges
server {
  listen 80;
  server_name desirsolutions.com www.desirsolutions.com;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# HTTPS — main server
server {
  listen 443 ssl;
  server_name desirsolutions.com www.desirsolutions.com;

  ssl_certificate /etc/letsencrypt/live/desirsolutions.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/desirsolutions.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  root /usr/share/nginx/html;
  index index.html;

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'self';" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

  # Static site
  location / {
    limit_req zone=pages burst=20 nodelay;
    try_files $uri $uri/ /index.html;
  }

  # API proxy to FastAPI backend
  location = /api/health {
    limit_req zone=api burst=10 nodelay;
    proxy_pass http://backend:8000/health;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
    proxy_connect_timeout 5s;
  }

  location = /api/health/db {
    limit_req zone=api burst=10 nodelay;
    proxy_pass http://backend:8000/health/db;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
    proxy_connect_timeout 5s;
  }

  location /api/ {
    limit_req zone=api burst=10 nodelay;
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
    proxy_connect_timeout 5s;
  }

  # Static asset caching
  location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
  }

  # Custom error responses
  error_page 502 /502.html;
  error_page 503 /503.html;
  error_page 429 /429.html;

  location = /502.html {
    internal;
    default_type text/html;
    return 502 '<!doctype html><html><head><title>Service Unavailable</title></head><body style="font-family:sans-serif;text-align:center;padding:4rem"><h1>Service Temporarily Unavailable</h1><p>We are performing maintenance. Please try again shortly.</p></body></html>';
  }

  location = /503.html {
    internal;
    default_type text/html;
    return 503 '<!doctype html><html><head><title>Service Unavailable</title></head><body style="font-family:sans-serif;text-align:center;padding:4rem"><h1>Service Temporarily Unavailable</h1><p>We are performing maintenance. Please try again shortly.</p></body></html>';
  }

  location = /429.html {
    internal;
    default_type text/html;
    return 429 '<!doctype html><html><head><title>Too Many Requests</title></head><body style="font-family:sans-serif;text-align:center;padding:4rem"><h1>Too Many Requests</h1><p>Please wait a moment before trying again.</p></body></html>';
  }
}
