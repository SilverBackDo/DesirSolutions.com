# Staging nginx config
# Intended for the dedicated staging host or a local staging compose project.

server_tokens off;
client_max_body_size 1m;
resolver 127.0.0.11 ipv6=off valid=30s;

gzip on;
gzip_vary on;
gzip_proxied any;
gzip_min_length 256;
gzip_comp_level 4;
gzip_types text/plain text/css text/xml text/javascript
           application/json application/javascript application/xml
           application/rss+xml application/atom+xml
           image/svg+xml font/woff2;

limit_req_zone $binary_remote_addr zone=pages:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=5r/s;
limit_req_status 429;

server {
  listen 80;
  server_name staging.desirsolutions.com;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl;
  server_name staging.desirsolutions.com;

  ssl_certificate /etc/letsencrypt/live/staging.desirsolutions.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/staging.desirsolutions.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  root /usr/share/nginx/html;
  index index.html;

  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'self';" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

  location / {
    limit_req zone=pages burst=20 nodelay;
    try_files $uri $uri/ /index.html;
  }

  location = /crm {
    return 301 /crm/;
  }

  location ^~ /crm/ {
    limit_req zone=pages burst=20 nodelay;
    set $crm_frontend_upstream crm-frontend:80;
    rewrite ^/crm/(.*)$ /$1 break;
    proxy_pass http://$crm_frontend_upstream$uri$is_args$args;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
    proxy_connect_timeout 5s;
  }

  location = /api/health {
    limit_req zone=api burst=10 nodelay;
    set $backend_upstream http://backend:8000;
    proxy_pass $backend_upstream/health;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /api/health/db {
    limit_req zone=api burst=10 nodelay;
    set $backend_upstream http://backend:8000;
    proxy_pass $backend_upstream/health/db;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/ {
    limit_req zone=api burst=10 nodelay;
    set $backend_upstream http://backend:8000;
    proxy_pass $backend_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
    proxy_connect_timeout 5s;
  }
}
