name: Deploy OCI Traefik platform

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'platform/**'
      - '.github/workflows/deploy-platform.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy platform to OCI VM via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.OCI_VM_HOST }}
          username: ${{ secrets.OCI_VM_USER }}
          key: ${{ secrets.OCI_VM_SSH_KEY }}
          script: |
            set -euo pipefail
            if [ ! -d /opt/consulting-mini-cloud/.git ]; then
              git clone --branch main https://github.com/${{ github.repository }}.git /opt/consulting-mini-cloud
            fi
            cd /opt/consulting-mini-cloud
            git fetch --all --prune
            git checkout main
            git pull --ff-only origin main
            bash platform/scripts/deploy-platform.sh
