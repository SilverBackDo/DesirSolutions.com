name: Validate OCI website infrastructure

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'infrastructure/terraform/**'
      - '.github/workflows/deploy-platform.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check formatting
        run: terraform fmt -check -recursive infrastructure/terraform

      - name: Validate dev environment
        working-directory: infrastructure/terraform/environments/dev
        run: |
          terraform init -backend=false
          terraform validate

      - name: Validate prod environment
        working-directory: infrastructure/terraform/environments/prod
        run: |
          terraform init -backend=false
          terraform validate
