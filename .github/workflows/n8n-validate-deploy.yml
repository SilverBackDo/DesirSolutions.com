name: Validate And Deploy n8n

on:
  pull_request:
    paths:
      - 'ansible/**'
      - 'n8n/**'
      - 'proxy/**'
      - 'backups/**'
      - 'docs/n8n/**'
      - 'scripts/validate-n8n-host.sh'
      - 'scripts/n8n-healthcheck.sh'
      - '.github/workflows/n8n-validate-deploy.yml'
  push:
    branches:
      - main
    paths:
      - 'ansible/**'
      - 'n8n/**'
      - 'proxy/**'
      - 'backups/**'
      - 'docs/n8n/**'
      - 'scripts/validate-n8n-host.sh'
      - 'scripts/n8n-healthcheck.sh'
      - '.github/workflows/n8n-validate-deploy.yml'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Ansible
        working-directory: ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible
          ansible-galaxy collection install -r requirements.yml

      - name: Ansible syntax check
        working-directory: ansible
        run: |
          ansible-playbook --syntax-check playbooks/n8n-validate-host.yml
          ansible-playbook --syntax-check playbooks/n8n-deploy.yml

      - name: Validate n8n compose file
        working-directory: n8n
        run: |
          cp .env.example .env
          docker compose config

      - name: Validate n8n workflow JSON and shell helpers
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          for path in sorted(Path("n8n/workflows").glob("*.json")):
              with path.open("r", encoding="utf-8") as handle:
                  json.load(handle)
              print(f"validated {path}")
          PY
          bash -n backups/backup-n8n.sh
          bash -n backups/restore-n8n.sh
          bash -n scripts/n8n-healthcheck.sh
          bash -n scripts/smoke-crm-automation.sh

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Validate existing Terraform prod environment
        working-directory: infrastructure/terraform/environments/prod
        run: |
          terraform init -backend=false
          terraform validate

  deploy:
    if: github.event_name == 'workflow_dispatch'
    needs: validate
    runs-on: self-hosted
    environment: n8n-production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ansible dependencies
        working-directory: ansible
        run: |
          python3 -m pip install --upgrade pip
          pip3 install ansible
          ansible-galaxy collection install -r requirements.yml

      - name: Write secrets file
        shell: bash
        run: |
          cat > /tmp/n8n-secrets.yml <<'EOF'
          n8n_postgres_password: "${{ secrets.N8N_POSTGRES_PASSWORD }}"
          n8n_encryption_key: "${{ secrets.N8N_ENCRYPTION_KEY }}"
          n8n_user_management_jwt_secret: "${{ secrets.N8N_USER_MANAGEMENT_JWT_SECRET }}"
          n8n_smtp_host: "${{ secrets.N8N_SMTP_HOST }}"
          n8n_smtp_port: 587
          n8n_smtp_user: "${{ secrets.N8N_SMTP_USER }}"
          n8n_smtp_password: "${{ secrets.N8N_SMTP_PASSWORD }}"
          n8n_smtp_sender: "${{ secrets.N8N_SMTP_SENDER }}"
          n8n_letsencrypt_email: "${{ secrets.N8N_LETSENCRYPT_EMAIL }}"
          desir_crm_api_key: "${{ secrets.DESIR_CRM_API_KEY }}"
          EOF

      - name: Validate host
        working-directory: ansible
        run: ansible-playbook playbooks/n8n-validate-host.yml -e @/tmp/n8n-secrets.yml

      - name: Deploy n8n
        working-directory: ansible
        run: ansible-playbook playbooks/n8n-deploy.yml -e @/tmp/n8n-secrets.yml

      - name: Post-deploy validation
        run: /opt/desir/n8n-stack/healthcheck-n8n.sh
