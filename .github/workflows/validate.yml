name: Validate Repository

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-website:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Verify launch posture strings
        run: |
          ! grep -R "South Dakota" website/src website/README.md README.md

      - name: Install website dependencies
        working-directory: website
        run: npm ci

      - name: Lint website
        working-directory: website
        run: npm run lint

      - name: Build website
        working-directory: website
        run: npm run build

      - name: Validate deploy compose file
        working-directory: website
        env:
          DESIR_WEBSITE_IMAGE: ghcr.io/silverbackdo/desirsolutions-website:latest
          DESIR_WEBSITE_PORT: 8080
        run: docker compose -f docker-compose.deploy.yml config

      - name: Validate production compose file
        working-directory: website
        env:
          DESIR_WEBSITE_IMAGE: ghcr.io/silverbackdo/desirsolutions-website:latest
          DESIR_WEBSITE_PORT: 8080
        run: docker compose -f docker-compose.prod.yml config

  validate-terraform:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive infrastructure/terraform

      - name: Terraform init and validate dev
        working-directory: infrastructure/terraform/environments/dev
        run: |
          terraform init -backend=false
          terraform validate

      - name: Terraform init and validate prod
        working-directory: infrastructure/terraform/environments/prod
        run: |
          terraform init -backend=false
          terraform validate
