name: Deploy Desir Solutions website

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref to deploy
        required: true
        default: main
        type: string
  push:
    branches:
      - main
    paths:
      - 'website/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      APP_DIR: /opt/desir/DesirSolutions.com
      DESIR_WEBSITE_PORT: ${{ vars.OCI_WEBSITE_PORT || '80' }}
      GIT_REF: ${{ github.event.inputs.git_ref || 'main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy website to OCI VM via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.OCI_VM_HOST }}
          username: ${{ secrets.OCI_VM_USER }}
          key: ${{ secrets.OCI_VM_SSH_KEY }}
          envs: APP_DIR,DESIR_WEBSITE_PORT,GIT_REF
          script: |
            set -euo pipefail
            if [ ! -d "$APP_DIR/.git" ]; then
              mkdir -p "$(dirname "$APP_DIR")"
              git clone --branch main https://github.com/${{ github.repository }}.git "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch --all --prune
            git checkout "$GIT_REF"
            if git rev-parse --verify "origin/$GIT_REF" >/dev/null 2>&1; then
              git reset --hard "origin/$GIT_REF"
            fi

            cd website
            docker compose config >/dev/null
            docker compose up -d --build
            docker compose ps
            curl -fsS "http://127.0.0.1:${DESIR_WEBSITE_PORT}/healthz"
