name: Publish and deploy Desir Solutions website image

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref to deploy
        required: true
        default: main
        type: string
  push:
    branches:
      - main
    paths:
      - 'website/**'
      - '.github/workflows/deploy.yml'

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  publish:
    runs-on: ubuntu-latest
    outputs:
      owner: ${{ steps.image.outputs.owner }}
      tag: ${{ steps.image.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.git_ref || github.ref_name }}

      - name: Normalize image metadata
        id: image
        shell: bash
        run: |
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push website image
        uses: docker/build-push-action@v6
        with:
          context: website
          file: website/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.image.outputs.owner }}/desirsolutions-website:latest
            ghcr.io/${{ steps.image.outputs.owner }}/desirsolutions-website:${{ steps.image.outputs.tag }}

      - name: Publish deployment summary
        shell: bash
        run: |
          {
            echo "## Website Image Published"
            echo
            echo "- Latest: \`ghcr.io/${{ steps.image.outputs.owner }}/desirsolutions-website:latest\`"
            echo "- Commit tag: \`ghcr.io/${{ steps.image.outputs.owner }}/desirsolutions-website:${{ steps.image.outputs.tag }}\`"
            echo
            echo "Deploy from an allowlisted operator IP with:"
            echo '```bash'
            echo 'ssh opc@OCI_PUBLIC_IP'
            echo 'cd /opt/desir/DesirSolutions.com || git clone https://github.com/SilverBackDo/DesirSolutions.com.git /opt/desir/DesirSolutions.com'
            echo 'cd /opt/desir/DesirSolutions.com'
            echo 'git fetch --all --prune && git checkout main && git reset --hard origin/main'
            echo 'cd website'
            echo 'export DESIR_WEBSITE_IMAGE=ghcr.io/${{ steps.image.outputs.owner }}/desirsolutions-website:${{ steps.image.outputs.tag }}'
            echo 'docker compose -f docker-compose.deploy.yml pull'
            echo 'docker compose -f docker-compose.deploy.yml up -d'
            echo 'docker inspect -f "{{.State.Health.Status}}" desirsolutions-website'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    runs-on: [self-hosted, desir-prod-deploy]
    needs: publish
    steps:
      - name: Check deploy prerequisites
        id: deploy_prereqs
        env:
          OCI_VM_HOST: ${{ vars.OCI_VM_HOST || secrets.OCI_VM_HOST }}
          OCI_VM_USER: ${{ vars.OCI_VM_USER || secrets.OCI_VM_USER }}
          OCI_VM_SSH_KEY: ${{ secrets.OCI_VM_SSH_KEY }}
        run: |
          set -euo pipefail
          missing=()
          for var in OCI_VM_HOST OCI_VM_USER OCI_VM_SSH_KEY; do
            if [ -z "${!var:-}" ]; then
              missing+=("$var")
            fi
          done

          if [ "${#missing[@]}" -eq 0 ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          joined_missing=$(printf '%s, ' "${missing[@]}")
          joined_missing=${joined_missing%, }

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "::error::Missing required deploy secrets: ${joined_missing}"
            exit 1
          fi

          {
            echo "## Website Deploy Skipped"
            echo
            echo "Required deploy secrets are not configured for this repository."
            echo
            echo "Missing secrets: \`${joined_missing}\`"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "ready=false" >> "$GITHUB_OUTPUT"

      - name: Prepare SSH trust
        if: steps.deploy_prereqs.outputs.ready == 'true'
        env:
          OCI_VM_HOST: ${{ vars.OCI_VM_HOST || secrets.OCI_VM_HOST }}
          OCI_VM_SSH_KEY: ${{ secrets.OCI_VM_SSH_KEY }}
          OCI_VM_HOST_FINGERPRINT: ${{ secrets.OCI_VM_HOST_FINGERPRINT }}
        run: |
          set -euo pipefail
          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$OCI_VM_SSH_KEY" > "$HOME/.ssh/oci_vm_key"
          chmod 600 "$HOME/.ssh/oci_vm_key"

          ssh-keyscan -H "$OCI_VM_HOST" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

          if [ -n "${OCI_VM_HOST_FINGERPRINT:-}" ]; then
            ssh-keygen -lf "$HOME/.ssh/known_hosts" > "$RUNNER_TEMP/known_hosts.fingerprints"
            grep -F "$OCI_VM_HOST_FINGERPRINT" "$RUNNER_TEMP/known_hosts.fingerprints" >/dev/null
          fi

      - name: Deploy website on OCI VM
        if: steps.deploy_prereqs.outputs.ready == 'true'
        env:
          OCI_VM_HOST: ${{ vars.OCI_VM_HOST || secrets.OCI_VM_HOST }}
          OCI_VM_USER: ${{ vars.OCI_VM_USER || secrets.OCI_VM_USER }}
          WEBSITE_DEPLOY_WORKDIR: ${{ vars.WEBSITE_DEPLOY_WORKDIR || '/opt/desir/DesirSolutions.com' }}
          WEBSITE_PUBLIC_BASE_URL: ${{ vars.WEBSITE_PUBLIC_BASE_URL || 'http://127.0.0.1' }}
          WEBSITE_PUBLIC_HOST: ${{ vars.WEBSITE_PUBLIC_HOST || 'desirsolutions.com' }}
          DEPLOY_REF: ${{ github.event.inputs.git_ref || github.ref_name }}
          WEBSITE_IMAGE: ghcr.io/${{ needs.publish.outputs.owner }}/desirsolutions-website:${{ needs.publish.outputs.tag }}
        run: |
          ssh \
            -i "$HOME/.ssh/oci_vm_key" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${OCI_VM_USER}@${OCI_VM_HOST}" \
            "WEBSITE_DEPLOY_WORKDIR='${WEBSITE_DEPLOY_WORKDIR}' WEBSITE_PUBLIC_BASE_URL='${WEBSITE_PUBLIC_BASE_URL}' WEBSITE_PUBLIC_HOST='${WEBSITE_PUBLIC_HOST}' DEPLOY_REF='${DEPLOY_REF}' WEBSITE_IMAGE='${WEBSITE_IMAGE}' bash -s" <<'EOF'
            set -euo pipefail

            deploy_root="${WEBSITE_DEPLOY_WORKDIR:?WEBSITE_DEPLOY_WORKDIR is required}"
            deploy_ref="${DEPLOY_REF:?DEPLOY_REF is required}"
            website_image="${WEBSITE_IMAGE:?WEBSITE_IMAGE is required}"
            website_public_base_url="${WEBSITE_PUBLIC_BASE_URL:?WEBSITE_PUBLIC_BASE_URL is required}"
            website_public_host="${WEBSITE_PUBLIC_HOST:?WEBSITE_PUBLIC_HOST is required}"
            current_user="$(id -un)"
            current_group="$(id -gn)"
            platform_root="/srv/platform"
            platform_env_file="$platform_root/.env"
            platform_script="$deploy_root/platform/scripts/deploy-platform.sh"

            sudo install -d -m 0755 "$(dirname "$deploy_root")"
            sudo install -d -m 0755 "$deploy_root"
            sudo chown -R "$current_user:$current_group" "$deploy_root"
            if [ ! -d "$deploy_root/.git" ]; then
              git clone https://github.com/SilverBackDo/DesirSolutions.com.git "$deploy_root"
            fi

            git -C "$deploy_root" fetch --all --prune
            git -C "$deploy_root" checkout "$deploy_ref"
            git -C "$deploy_root" pull --ff-only origin "$deploy_ref"

            if [ ! -f "$platform_script" ]; then
              echo "Platform deploy script not found: $platform_script" >&2
              exit 1
            fi

            DESIRSOLUTIONS_IMAGE="$website_image" \
            PLATFORM_ROOT="$platform_root" \
            PLATFORM_ENV_FILE="$platform_env_file" \
              bash "$platform_script"

            for attempt in $(seq 1 20); do
              status=$(sudo docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' desirsolutions-site 2>/dev/null || true)
              if [ "$status" = "healthy" ] || [ "$status" = "running" ]; then
                curl --fail --show-error --silent \
                -H "Host: ${website_public_host}" \
                "${website_public_base_url%/}/" >/dev/null
                exit 0
              fi
              sleep 3
            done

            sudo docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' || true
            sudo docker logs --tail=80 desirsolutions-site || true
            exit 1
          EOF

      - name: Publish deploy summary
        if: steps.deploy_prereqs.outputs.ready == 'true'
        env:
          WEBSITE_PUBLIC_URL: ${{ vars.WEBSITE_PUBLIC_URL || 'https://desirsolutions.com/' }}
          WEBSITE_IMAGE: ghcr.io/${{ needs.publish.outputs.owner }}/desirsolutions-website:${{ needs.publish.outputs.tag }}
        run: |
          {
            echo "## Website Deployed"
            echo
            echo "- Image: \`${WEBSITE_IMAGE}\`"
            echo "- Route: \`${WEBSITE_PUBLIC_URL}\`"
          } >> "$GITHUB_STEP_SUMMARY"
