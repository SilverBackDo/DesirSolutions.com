name: Deploy Desir Solutions website

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref to deploy
        required: true
        default: main
        type: string
  push:
    branches:
      - main
    paths:
      - 'website/**'
      - '.github/workflows/deploy.yml'

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      APP_DIR: /opt/desir/DesirSolutions.com
      DESIR_WEBSITE_PORT: ${{ vars.OCI_WEBSITE_PORT || '80' }}
      GIT_REF: ${{ github.event.inputs.git_ref || 'main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image metadata
        id: image
        shell: bash
        run: |
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push website image
        uses: docker/build-push-action@v6
        with:
          context: website
          file: website/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.image.outputs.owner }}/desirsolutions-website:latest
            ghcr.io/${{ steps.image.outputs.owner }}/desirsolutions-website:${{ steps.image.outputs.tag }}

      - name: Deploy website image to OCI VM via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.OCI_VM_HOST }}
          username: ${{ secrets.OCI_VM_USER }}
          key: ${{ secrets.OCI_VM_SSH_KEY }}
          envs: APP_DIR,DESIR_WEBSITE_PORT,GIT_REF
          script: |
            set -euo pipefail
            DESIR_WEBSITE_IMAGE="ghcr.io/${{ steps.image.outputs.owner }}/desirsolutions-website:${{ steps.image.outputs.tag }}"
            if [ ! -d "$APP_DIR/.git" ]; then
              mkdir -p "$(dirname "$APP_DIR")"
              git clone --branch main https://github.com/${{ github.repository }}.git "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch --all --prune
            git checkout "$GIT_REF"
            if git rev-parse --verify "origin/$GIT_REF" >/dev/null 2>&1; then
              git reset --hard "origin/$GIT_REF"
            fi

            cd website
            export DESIR_WEBSITE_IMAGE
            COMPOSE_FILE="docker-compose.deploy.yml"
            if [ -f /etc/letsencrypt/live/desirsolutions.com/fullchain.pem ]; then
              COMPOSE_FILE="docker-compose.prod.yml"
            fi

            docker compose -f "$COMPOSE_FILE" config >/dev/null
            docker compose -f "$COMPOSE_FILE" pull
            docker compose -f "$COMPOSE_FILE" up -d
            docker compose -f "$COMPOSE_FILE" ps

            for attempt in $(seq 1 20); do
              status="$(docker inspect -f '{{.State.Health.Status}}' desirsolutions-website 2>/dev/null || true)"
              if [ "$status" = "healthy" ]; then
                exit 0
              fi
              sleep 3
            done

            docker logs desirsolutions-website --tail 100 >&2 || true
            exit 1
