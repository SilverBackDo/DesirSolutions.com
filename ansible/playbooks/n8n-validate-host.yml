---
- name: Validate n8n target host prerequisites
  hosts: n8n_hosts
  gather_facts: true
  tasks:
    - name: Ensure host is Oracle Linux or compatible
      ansible.builtin.assert:
        that:
          - ansible_system == "Linux"
          - ansible_distribution in ["OracleLinux", "Rocky", "AlmaLinux", "CentOS", "RedHat"]
        fail_msg: "Target host must be Oracle Linux or a compatible RHEL-family host."

    - name: Ensure Docker CLI is installed
      ansible.builtin.command: docker --version
      register: docker_version
      changed_when: false

    - name: Ensure compose plugin is installed
      ansible.builtin.command: docker compose version
      register: compose_version
      changed_when: false

    - name: Ensure platform_edge network exists
      ansible.builtin.command: docker network inspect {{ n8n_stack_network }}
      register: network_check
      changed_when: false

    - name: Ensure required variables are present
      ansible.builtin.assert:
        that:
          - n8n_postgres_password is defined
          - n8n_encryption_key is defined
          - n8n_user_management_jwt_secret is defined
          - n8n_smtp_host is defined
          - n8n_letsencrypt_email is defined
          - desir_crm_api_key is defined
        fail_msg: "Missing one or more required n8n secret variables."
