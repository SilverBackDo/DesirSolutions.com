name: desirsolutions-platform

services:
  traefik:
    image: traefik:v3.6.6
    container_name: reverse-proxy
    restart: unless-stopped
    command:
      - --global.checknewversion=false
      - --global.sendanonymoususage=false
      - --log.level=INFO
      - --accesslog=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=platform_edge
      - --ping=true
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entryPoint.to=websecure
      - --entrypoints.web.http.redirections.entryPoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/var/traefik/acme/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /srv/platform/traefik/acme:/var/traefik/acme
    networks:
      - platform_edge
    labels:
      - traefik.enable=true
      - traefik.docker.network=platform_edge

  desirsolutions:
    image: ${DESIRSOLUTIONS_IMAGE}
    container_name: desirsolutions-site
    init: true
    restart: unless-stopped
    pull_policy: always
    networks:
      - platform_edge
    healthcheck:
      test:
        - CMD
        - wget
        - --quiet
        - --tries=1
        - --spider
        - http://127.0.0.1/healthz
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - traefik.enable=true
      - traefik.docker.network=platform_edge
      - traefik.http.routers.desirsolutions.rule=Host(`${DESIRSOLUTIONS_DOMAIN}`) || Host(`www.${DESIRSOLUTIONS_DOMAIN}`)
      - traefik.http.routers.desirsolutions.entrypoints=websecure
      - traefik.http.routers.desirsolutions.tls.certresolver=letsencrypt
      - traefik.http.routers.desirsolutions.middlewares=desirsolutions-apex-redirect,desirsolutions-security
      - traefik.http.middlewares.desirsolutions-apex-redirect.redirectregex.regex=^https://www\.(.*)
      - traefik.http.middlewares.desirsolutions-apex-redirect.redirectregex.replacement=https://$${1}
      - traefik.http.middlewares.desirsolutions-apex-redirect.redirectregex.permanent=true
      - traefik.http.middlewares.desirsolutions-security.headers.contentTypeNosniff=true
      - traefik.http.middlewares.desirsolutions-security.headers.browserXssFilter=true
      - traefik.http.middlewares.desirsolutions-security.headers.frameDeny=true
      - traefik.http.middlewares.desirsolutions-security.headers.forceSTSHeader=true
      - traefik.http.middlewares.desirsolutions-security.headers.stsSeconds=31536000
      - traefik.http.middlewares.desirsolutions-security.headers.stsIncludeSubdomains=true
      - traefik.http.middlewares.desirsolutions-security.headers.referrerPolicy=strict-origin-when-cross-origin
      - traefik.http.middlewares.desirsolutions-security.headers.permissionsPolicy=accelerometer=(),camera=(),geolocation=(),microphone=(),payment=(),usb=()
      - traefik.http.services.desirsolutions.loadbalancer.server.port=80

networks:
  platform_edge:
    external: true
    name: platform_edge
