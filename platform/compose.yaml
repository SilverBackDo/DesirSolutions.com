name: consulting-mini-cloud

x-static-site: &static-site
  image: nginx:1.27-alpine
  restart: unless-stopped
  networks:
    - platform_edge
  healthcheck:
    test:
      - CMD-SHELL
      - wget -q -O /dev/null http://127.0.0.1/ || exit 1
    interval: 30s
    timeout: 5s
    retries: 3
    start_period: 10s

services:
  traefik:
    image: traefik:v3.3
    container_name: reverse-proxy
    restart: unless-stopped
    command:
      - --global.checknewversion=false
      - --global.sendanonymoususage=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=platform_edge
      - --api.dashboard=true
      - --ping=true
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entryPoint.to=websecure
      - --entrypoints.web.http.redirections.entryPoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/var/traefik/acme/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /srv/platform/traefik/acme:/var/traefik/acme
    networks:
      - platform_edge
    labels:
      - traefik.enable=true
      - traefik.docker.network=platform_edge
      - traefik.http.routers.traefik.rule=Host(`${TRAEFIK_DASHBOARD_HOST}`)
      - traefik.http.routers.traefik.entrypoints=websecure
      - traefik.http.routers.traefik.tls.certresolver=letsencrypt
      - traefik.http.routers.traefik.service=api@internal
      - traefik.http.middlewares.dashboard-auth.basicauth.users=${TRAEFIK_DASHBOARD_USERS}
      - traefik.http.routers.traefik.middlewares=dashboard-auth

  bellahburger:
    <<: *static-site
    container_name: bellahburger-site
    volumes:
      - /srv/platform/bellahburger/current:/usr/share/nginx/html:ro
    labels:
      - traefik.enable=true
      - traefik.docker.network=platform_edge
      - traefik.http.routers.bellahburger.rule=Host(`${BELLAHBURGER_DOMAIN}`) || Host(`www.${BELLAHBURGER_DOMAIN}`)
      - traefik.http.routers.bellahburger.entrypoints=websecure
      - traefik.http.routers.bellahburger.tls.certresolver=letsencrypt
      - traefik.http.services.bellahburger.loadbalancer.server.port=80

  desirsolutions:
    <<: *static-site
    container_name: desirsolutions-site
    volumes:
      - /srv/platform/desirsolutions/current:/usr/share/nginx/html:ro
    labels:
      - traefik.enable=true
      - traefik.docker.network=platform_edge
      - traefik.http.routers.desirsolutions.rule=Host(`${DESIRSOLUTIONS_DOMAIN}`) || Host(`www.${DESIRSOLUTIONS_DOMAIN}`)
      - traefik.http.routers.desirsolutions.entrypoints=websecure
      - traefik.http.routers.desirsolutions.tls.certresolver=letsencrypt
      - traefik.http.services.desirsolutions.loadbalancer.server.port=80

  alcines:
    <<: *static-site
    container_name: alcines-site
    volumes:
      - /srv/platform/Alcines/current:/usr/share/nginx/html:ro
    labels:
      - traefik.enable=true
      - traefik.docker.network=platform_edge
      - traefik.http.routers.alcines.rule=Host(`${ALCINES_DOMAIN}`) || Host(`www.${ALCINES_DOMAIN}`)
      - traefik.http.routers.alcines.entrypoints=websecure
      - traefik.http.routers.alcines.tls.certresolver=letsencrypt
      - traefik.http.services.alcines.loadbalancer.server.port=80

networks:
  platform_edge:
    name: platform_edge
