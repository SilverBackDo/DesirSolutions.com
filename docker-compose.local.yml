services:
  frontend:
    environment:
      SKIP_TLS_BOOTSTRAP: "1"
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.local.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1/",
        ]
